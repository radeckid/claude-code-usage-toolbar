name: ClaudeUsageBar
options:
  bundleIdPrefix: com.claudeusagebar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"

targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - ClaudeUsageBar
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusagebar.app
        INFOPLIST_FILE: ClaudeUsageBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageBar/ClaudeUsageBar.entitlements
        PRODUCT_NAME: "Claude Usage Bar"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ClaudeUsageBar/Info.plist
      properties:
        LSUIElement: true
