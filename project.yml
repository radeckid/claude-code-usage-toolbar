name: ClaudeUsageBar
options:
  bundleIdPrefix: com.claudeusagebar
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    DEAD_CODE_STRIPPING: true
    ENABLE_USER_SCRIPT_SANDBOXING: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

targets:
  ClaudeUsageBar:
    type: application
    platform: macOS
    sources:
      - ClaudeUsageBar
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.claudeusagebar.app
        INFOPLIST_FILE: ClaudeUsageBar/Info.plist
        CODE_SIGN_ENTITLEMENTS: ClaudeUsageBar/ClaudeUsageBar.entitlements
        PRODUCT_NAME: "Claude Usage Bar"
        MARKETING_VERSION: "1.0.1"
        CURRENT_PROJECT_VERSION: "1"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        SWIFT_STRICT_CONCURRENCY: complete
    info:
      path: ClaudeUsageBar/Info.plist
      properties:
        LSUIElement: true
        SUFeedURL: "https://github.com/radeckid/claude-code-usage-toolbar/releases/latest/download/appcast.xml"
        SUPublicEDKey: "n648BK88MGKXAyciuYaGS7ET/GzExraKeVxevFCOoAs="
        SUEnableAutomaticChecks: true
